<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAW</title>
<style>
:root {
  --bg:         #080b12;
  --surface:    #0f1520;
  --border:     #1a2535;
  --accent:     #00e5ff;
  --accent-dim: rgba(0,229,255,0.14);
  --text:       #c8d8e8;
  --muted:      #4a6075;
  --radius:     7px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
body { display: flex; flex-direction: column; height: 100dvh; }

/* ── Transport ── */
.transport {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  padding: 9px 14px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tgroup { display: flex; align-items: center; gap: 7px; }
.tdiv   { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.tlabel { color: var(--muted); font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.07em; }

button {
  background: transparent; border: 1px solid var(--border);
  color: var(--text); padding: 5px 13px; border-radius: var(--radius);
  cursor: pointer; font-size: 13px; font-family: inherit;
  transition: border-color .15s, color .15s, background .15s, box-shadow .15s;
  white-space: nowrap;
}
button:hover { border-color: var(--accent); color: var(--accent); }
button.active {
  background: var(--accent-dim); border-color: var(--accent);
  color: var(--accent); box-shadow: 0 0 10px rgba(0,229,255,.18);
}

input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 96px; height: 4px; border-radius: 2px;
  background: var(--border); outline: none; cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
  background: var(--accent); cursor: pointer;
}
input[type="range"]::-moz-range-thumb {
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--accent); border: none; cursor: pointer;
}

select {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 4px 7px; border-radius: var(--radius);
  font-size: 13px; font-family: inherit; cursor: pointer;
}
select:focus { outline: 1px solid var(--accent); }

.bpm-val { color: var(--accent); font-size: 13px; font-variant-numeric: tabular-nums; min-width: 30px; }

.adsr-group { align-items: flex-start; flex-direction: column; gap: 2px; }
.adsr-row   { display: flex; align-items: center; gap: 5px; }
.adsr-lbl   { color: var(--muted); font-size: 10px; font-weight: 700;
  letter-spacing: 0.04em; width: 10px; text-align: right; }
.adsr-slider { width: 72px; }
.adsr-val   { color: var(--accent); font-size: 10px; font-variant-numeric: tabular-nums;
  min-width: 36px; }

/* ── Tracks ── */
.tracks-container {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column;
}

.track-row {
  display: flex; flex-direction: column; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.track-main { display: flex; flex-direction: row; }

.track-head {
  width: 164px; flex-shrink: 0;
  background: var(--surface);
  border-right: 2px solid var(--border);
  padding: 8px 10px;
  display: flex; flex-direction: column; gap: 7px;
  cursor: pointer; user-select: none;
  transition: border-right-color .15s;
}
.track-row.active .track-head { border-right-color: var(--track-color, var(--accent)); }

.track-name {
  font-size: 12px; font-weight: 600; color: var(--text);
}

.track-btns { display: flex; gap: 5px; }

.tbtn {
  padding: 3px 9px; font-size: 11px; border-radius: 4px;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; font-family: inherit;
  transition: all .15s;
}
.tbtn:hover { border-color: var(--accent); color: var(--accent); }
.tbtn.muted  { border-color: rgba(255,80,80,.5); color: #ff5050; background: rgba(255,80,80,.1); }
.tbtn.soloed { border-color: rgba(255,200,0,.5); color: #ffc800; background: rgba(255,200,0,.1); }

.track-vol-row { display: flex; align-items: center; gap: 5px; }
.track-vol-row input[type="range"] { width: 76px; }
.vol-val { color: var(--muted); font-size: 10px; font-variant-numeric: tabular-nums; min-width: 28px; }
/* ── FX strip ── */
.fx-strip {
  display: none; flex-direction: row;
  background: #060910; border-top: 1px solid var(--border);
  overflow-x: auto; flex-shrink: 0;
}
.fx-strip.open { display: flex; }
.fx-block {
  padding: 8px 14px; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 5px; min-width: 148px;
}
.fx-block-name {
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 1px;
}
.fx-row { display: flex; align-items: center; gap: 6px; }
.fx-lbl { color: var(--muted); font-size: 10px; font-weight: 500; min-width: 38px; }
.fx-row input[type="range"] { width: 68px; }
.fx-val { color: var(--muted); font-size: 10px; min-width: 34px;
  font-variant-numeric: tabular-nums; }

.roll-wrap {
  flex: 1; overflow: auto;
  height: 208px; /* updated dynamically by rowH */
}

canvas.roll { display: block; cursor: crosshair; }

/* ── Per-track vertical zoom (custom drag) ── */
.zoom-col {
  width: 28px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface); border-left: 1px solid var(--border);
  cursor: ns-resize; user-select: none;
}
.zoom-groove {
  width: 3px; height: calc(100% - 20px);
  background: var(--border); border-radius: 2px;
  position: relative; flex-shrink: 0;
}
.zoom-thumb {
  width: 14px; height: 14px;
  background: var(--accent); border-radius: 50%;
  position: absolute; left: 50%; transform: translateX(-50%) translateY(-50%);
  box-shadow: 0 0 7px rgba(0,229,255,.45);
  transition: box-shadow .1s;
  top: 50%; /* updated dynamically */
}
.zoom-thumb:hover { box-shadow: 0 0 14px rgba(0,229,255,.7); }
</style>
</head>
<body>

<div class="transport">
  <div class="tgroup">
    <button id="playBtn">▶ Play</button>
    <button id="stopBtn">■ Stop</button>
  </div>
  <div class="tdiv"></div>
  <div class="tgroup">
    <span class="tlabel">BPM</span>
    <input type="range" id="bpmSlider" min="40" max="220" value="120">
    <span class="bpm-val" id="bpmVal">120</span>
  </div>
  <div class="tdiv"></div>
  <div class="tgroup">
    <span class="tlabel">Bars</span>
    <select id="barsSelect">
      <option value="1">1</option>
      <option value="2" selected>2</option>
      <option value="4">4</option>
      <option value="8">8</option>
    </select>
  </div>
  <div class="tdiv"></div>
  <div class="tgroup">
    <span class="tlabel">Grid</span>
    <select id="resSelect">
      <option value="4">1/4</option>
      <option value="8">1/8</option>
      <option value="16" selected>1/16</option>
      <option value="32">1/32</option>
    </select>
  </div>
  <div class="tdiv"></div>
  <div class="tgroup">
    <span class="tlabel">Zoom</span>
    <input type="range" id="zoomSlider" min="0.4" max="3" step="0.05" value="1">
    <span class="bpm-val" id="zoomVal">1.0×</span>
  </div>
  <div class="tdiv"></div>
  <div class="tgroup">
    <span class="tlabel">Wave</span>
    <button class="wave-btn active" data-wave="sine">Sine</button>
    <button class="wave-btn" data-wave="square">Square</button>
    <button class="wave-btn" data-wave="triangle">Tri</button>
    <button class="wave-btn" data-wave="sawtooth">Saw</button>
  </div>
  <div class="tdiv"></div>
  <div class="tgroup adsr-group">
    <div class="adsr-row">
      <span class="adsr-lbl">A</span>
      <input type="range" id="attack"  class="adsr-slider" min="1"  max="500"  step="1"    value="5">
      <span class="adsr-val" id="attack-val">5ms</span>
    </div>
    <div class="adsr-row">
      <span class="adsr-lbl">D</span>
      <input type="range" id="decay"   class="adsr-slider" min="10" max="1000" step="5"    value="80">
      <span class="adsr-val" id="decay-val">80ms</span>
    </div>
    <div class="adsr-row">
      <span class="adsr-lbl">S</span>
      <input type="range" id="sustain" class="adsr-slider" min="0"  max="1"    step="0.01" value="0.7">
      <span class="adsr-val" id="sustain-val">0.70</span>
    </div>
    <div class="adsr-row">
      <span class="adsr-lbl">R</span>
      <input type="range" id="release" class="adsr-slider" min="10" max="2000" step="5"    value="60">
      <span class="adsr-val" id="release-val">60ms</span>
    </div>
  </div>
  <div class="tdiv"></div>
  <div class="tgroup">
    <button id="loopBtn" class="active">⟳ Loop</button>
  </div>
  <div class="tdiv"></div>
  <div class="tgroup">
    <button id="clearBtn">✕ Clear</button>
  </div>
  <div class="tdiv"></div>
  <div class="tgroup">
    <button id="exportBtn">↓ Export WAV</button>
  </div>
</div>

<div class="tracks-container" id="tracks-container"></div>

<script>
'use strict';

// ── Layout ────────────────────────────────────────────────────────────────────
const KEYS_W     = 64;
const RULER_H    = 26;
const ROW_H      = 18;
const BASE_COL_W = 30;
const PITCH_HI   = 83;  // B5
const PITCH_LO   = 36;  // C2
const NUM_ROWS   = PITCH_HI - PITCH_LO + 1;
const BLACK_KEYS = new Set([1, 3, 6, 8, 10]);

const NUM_TRACKS    = 3;
const TRACK_NAMES   = ['Track 1', 'Track 2', 'Track 3'];
const TRACK_COLORS  = ['#00e5ff', '#ff6b6b', '#69ff94'];

// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  tracks: Array.from({ length: NUM_TRACKS }, (_, i) => ({
    name:   TRACK_NAMES[i],
    notes:  [],
    mute:   false,
    solo:   false,
    volume: 1.0,
    rowH:   18,
    eq:     { bass: 0, treble: 0 },
    grit:   { amount: 0 },
    delay:  { mix: 0, time: 250, feedback: 0.35 },
    reverb: { mix: 0, roomSize: 0.5, decay: 0.5 },
  })),
  activeTrack: 0,
  bpm:         120,
  bars:        2,
  resolution:  16,
  zoom:        1.0,
  waveform:    'sine',
  attack:      5,
  decay:       80,
  sustain:     0.7,
  release:     60,
  playing:     false,
  looping:     true,
  currentBeat: 0,
};

function colWidth()   { return Math.max(8, Math.round(BASE_COL_W * state.zoom)); }
function cellBeats()  { return 4 / state.resolution; }
function totalBeats() { return state.bars * 4; }
function numCols()    { return state.bars * state.resolution; }
function secPerBeat() { return 60 / state.bpm; }
function patternSec() { return totalBeats() * secPerBeat(); }
function isBlackKey(p){ return BLACK_KEYS.has(p % 12); }
function pitchToRow(p){ return PITCH_HI - p; }
function rowToPitch(r){ return PITCH_HI - r; }
function midiToHz(m)  { return 440 * Math.pow(2, (m - 69) / 12); }

// ── Track DOM elements ────────────────────────────────────────────────────────
const trackEls = []; // [{row, head, canvas, ctx, wrap}]

function buildTrackUI() {
  const container = document.getElementById('tracks-container');

  state.tracks.forEach((track, ti) => {
    const color = TRACK_COLORS[ti];

    const row = document.createElement('div');
    row.className = 'track-row' + (ti === 0 ? ' active' : '');
    row.style.setProperty('--track-color', color);

    // ── track-main (head + roll + zoom) ───────────────────────────────────────
    const main = document.createElement('div');
    main.className = 'track-main';

    // ── Header ──────────────────────────────────────────────────────────────
    const head = document.createElement('div');
    head.className = 'track-head';
    head.innerHTML = `
      <div class="track-name" style="color:${color}">${track.name}</div>
      <div class="track-btns">
        <button class="tbtn mute-btn">M</button>
        <button class="tbtn solo-btn">S</button>
        <button class="tbtn fx-btn">FX</button>
      </div>
      <div class="track-vol-row">
        <span class="adsr-lbl" style="color:var(--muted)">Vol</span>
        <input type="range" class="track-vol" min="0" max="1" step="0.01" value="1">
        <span class="vol-val">1.00</span>
      </div>`;

    head.addEventListener('click', () => setActiveTrack(ti));

    head.querySelector('.mute-btn').addEventListener('click', e => {
      e.stopPropagation(); track.mute = !track.mute;
      e.currentTarget.classList.toggle('muted', track.mute);
    });
    head.querySelector('.solo-btn').addEventListener('click', e => {
      e.stopPropagation(); track.solo = !track.solo;
      e.currentTarget.classList.toggle('soloed', track.solo);
    });

    const volSlider = head.querySelector('.track-vol');
    const volVal    = head.querySelector('.vol-val');
    volSlider.addEventListener('input', e => {
      track.volume = +e.target.value;
      volVal.textContent = track.volume.toFixed(2);
      if (trackGains[ti]) trackGains[ti].gain.value = track.volume;
    });

    // ── Canvas + zoom ─────────────────────────────────────────────────────────
    const wrap   = document.createElement('div'); wrap.className = 'roll-wrap';
    const canvas = document.createElement('canvas'); canvas.className = 'roll';
    wrap.appendChild(canvas);

    const zoomCol = document.createElement('div'); zoomCol.className = 'zoom-col';
    zoomCol.title = 'Drag to zoom pitch rows';
    const groove  = document.createElement('div'); groove.className = 'zoom-groove';
    const thumb   = document.createElement('div'); thumb.className  = 'zoom-thumb';
    groove.appendChild(thumb); zoomCol.appendChild(groove);

    const ZOOM_MIN = 8, ZOOM_MAX = 40;
    function setThumb() {
      thumb.style.top = ((1 - (track.rowH - ZOOM_MIN) / (ZOOM_MAX - ZOOM_MIN)) * 100) + '%';
    }
    setThumb();
    let zDragging = false, zStartY = 0, zStartRowH = track.rowH;
    zoomCol.addEventListener('mousedown', e => {
      zDragging = true; zStartY = e.clientY; zStartRowH = track.rowH; e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!zDragging) return;
      const dy = zStartY - e.clientY;
      const delta = Math.round((dy / (groove.getBoundingClientRect().height || 1)) * (ZOOM_MAX - ZOOM_MIN));
      track.rowH = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zStartRowH + delta));
      setThumb(); resizeTrack(ti); scrollToC4(ti); drawTrack(ti);
    });
    document.addEventListener('mouseup', () => { zDragging = false; });

    main.appendChild(head); main.appendChild(wrap); main.appendChild(zoomCol);

    // ── FX strip (collapsible, below main row) ───────────────────────────────
    const fxStrip = document.createElement('div');
    fxStrip.className = 'fx-strip';
    fxStrip.innerHTML = `
      <div class="fx-block">
        <div class="fx-block-name">EQ</div>
        <div class="fx-row">
          <span class="fx-lbl">Bass</span>
          <input type="range" class="eq-bass" min="-1" max="1" step="0.01" value="0">
          <span class="fx-val eq-bass-val">0dB</span>
        </div>
        <div class="fx-row">
          <span class="fx-lbl">Treble</span>
          <input type="range" class="eq-treble" min="-1" max="1" step="0.01" value="0">
          <span class="fx-val eq-tre-val">0dB</span>
        </div>
      </div>
      <div class="fx-block">
        <div class="fx-block-name">Grit</div>
        <div class="fx-row">
          <span class="fx-lbl">Amount</span>
          <input type="range" class="grit-amt" min="0" max="1" step="0.01" value="0">
          <span class="fx-val grit-val">0%</span>
        </div>
      </div>
      <div class="fx-block">
        <div class="fx-block-name">Delay</div>
        <div class="fx-row">
          <span class="fx-lbl">Mix</span>
          <input type="range" class="dly-mix" min="0" max="1" step="0.01" value="0">
          <span class="fx-val dly-mix-val">0%</span>
        </div>
        <div class="fx-row">
          <span class="fx-lbl">Time</span>
          <input type="range" class="dly-time" min="20" max="800" step="5" value="250">
          <span class="fx-val dly-time-val">250ms</span>
        </div>
        <div class="fx-row">
          <span class="fx-lbl">Feedback</span>
          <input type="range" class="dly-fb" min="0" max="0.9" step="0.01" value="0.35">
          <span class="fx-val dly-fb-val">35%</span>
        </div>
      </div>
      <div class="fx-block">
        <div class="fx-block-name">Reverb</div>
        <div class="fx-row">
          <span class="fx-lbl">Mix</span>
          <input type="range" class="rev-mix" min="0" max="1" step="0.01" value="0">
          <span class="fx-val rev-mix-val">0%</span>
        </div>
        <div class="fx-row">
          <span class="fx-lbl">Room</span>
          <input type="range" class="rev-room" min="0" max="1" step="0.01" value="0.5">
        </div>
        <div class="fx-row">
          <span class="fx-lbl">Decay</span>
          <input type="range" class="rev-decay" min="0" max="1" step="0.01" value="0.5">
        </div>
      </div>`;

    // FX toggle button
    const fxBtn = head.querySelector('.fx-btn');
    fxBtn.addEventListener('click', e => {
      e.stopPropagation();
      fxStrip.classList.toggle('open');
      fxBtn.classList.toggle('active', fxStrip.classList.contains('open'));
    });

    // Wire FX sliders
    function fxSlider(sel, get, set, fmt) {
      const el = fxStrip.querySelector(sel);
      const valEl = fxStrip.querySelector(sel + '-val');
      el.addEventListener('input', () => {
        set(+el.value);
        if (valEl) valEl.textContent = fmt(+el.value);
        applyFxParams(ti);
      });
    }
    const pct  = v => Math.round(v * 100) + '%';
    const db   = v => (v >= 0 ? '+' : '') + Math.round(v * 12) + 'dB';
    const ms   = v => Math.round(v) + 'ms';
    fxSlider('.eq-bass',   () => track.eq.bass,           v => { track.eq.bass   = v; }, db);
    fxSlider('.eq-treble', () => track.eq.treble,         v => { track.eq.treble = v; }, db);
    fxSlider('.grit-amt',  () => track.grit.amount,       v => { track.grit.amount    = v; }, pct);
    fxSlider('.dly-mix',   () => track.delay.mix,         v => { track.delay.mix      = v; }, pct);
    fxSlider('.dly-time',  () => track.delay.time,        v => { track.delay.time     = v; }, ms);
    fxSlider('.dly-fb',    () => track.delay.feedback,    v => { track.delay.feedback = v; }, pct);
    fxSlider('.rev-mix',   () => track.reverb.mix,        v => { track.reverb.mix     = v; }, pct);
    fxSlider('.rev-room',  () => track.reverb.roomSize,   v => { track.reverb.roomSize= v; }, () => '');
    fxSlider('.rev-decay', () => track.reverb.decay,      v => { track.reverb.decay   = v; }, () => '');

    row.appendChild(main);
    row.appendChild(fxStrip);
    container.appendChild(row);

    const ctx = canvas.getContext('2d');
    trackEls[ti] = { row, head, canvas, ctx, wrap };
    addTrackEvents(ti);
  });
}

function setActiveTrack(ti) {
  state.activeTrack = ti;
  trackEls.forEach(({ row }, i) => row.classList.toggle('active', i === ti));
}

// ── Canvas sizing ─────────────────────────────────────────────────────────────
function resizeTrack(ti) {
  const { canvas } = trackEls[ti];
  const rowH = state.tracks[ti].rowH;
  const W = KEYS_W + numCols() * colWidth();
  const H = RULER_H + NUM_ROWS * rowH;
  canvas.width = W; canvas.height = H;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  // wrap height is fixed in CSS — only the canvas inside scales
}

function resizeAll() {
  trackEls.forEach((_, ti) => resizeTrack(ti));
}

function scrollToC4(ti) {
  const rowH  = state.tracks[ti].rowH;
  const C4row = PITCH_HI - 60;
  trackEls[ti].wrap.scrollTop = Math.max(0, RULER_H + C4row * rowH - 40);
}

function initScroll() {
  trackEls.forEach((_, ti) => scrollToC4(ti));
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function drawGrid(ctx, canvas, rowH) {
  const W  = canvas.width, H = canvas.height;
  const nc = numCols();
  const CW = colWidth();
  const colsPerBar  = state.resolution;
  const colsPerBeat = state.resolution / 4;

  ctx.fillStyle = '#080b12';
  ctx.fillRect(0, 0, W, H);

  // Black-key row tint
  for (let r = 0; r < NUM_ROWS; r++) {
    if (isBlackKey(rowToPitch(r))) {
      ctx.fillStyle = 'rgba(0,0,0,.28)';
      ctx.fillRect(KEYS_W, RULER_H + r * rowH, nc * CW, rowH);
    }
  }

  // Vertical lines
  for (let c = 0; c <= nc; c++) {
    const x     = KEYS_W + c * CW;
    const isBar = c % colsPerBar  === 0;
    const isBeat= c % colsPerBeat === 0;
    ctx.strokeStyle = isBar ? '#2a4060' : isBeat ? '#1e3050' : '#13213a';
    ctx.lineWidth   = isBar ? 1.5 : 1;
    ctx.beginPath(); ctx.moveTo(x, RULER_H); ctx.lineTo(x, H); ctx.stroke();
  }

  // Horizontal lines
  ctx.strokeStyle = '#13213a'; ctx.lineWidth = 1;
  for (let r = 0; r <= NUM_ROWS; r++) {
    const y = RULER_H + r * rowH;
    ctx.beginPath(); ctx.moveTo(KEYS_W, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Ruler
  ctx.fillStyle = '#0f1520';
  ctx.fillRect(0, 0, W, RULER_H);
  ctx.strokeStyle = '#1a2535'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, RULER_H); ctx.lineTo(W, RULER_H); ctx.stroke();

  for (let c = 0; c <= nc; c++) {
    const isBar  = c % colsPerBar  === 0;
    const isBeat = c % colsPerBeat === 0;
    if (!isBeat && !isBar) continue;
    const x    = KEYS_W + c * CW;
    const bar  = Math.floor(c / colsPerBar) + 1;
    const beat = Math.floor((c % colsPerBar) / colsPerBeat) + 1;
    ctx.strokeStyle = isBar ? '#2a4060' : '#1e3050'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, isBar ? 0 : RULER_H - 7); ctx.lineTo(x, RULER_H); ctx.stroke();
    if (isBar) {
      ctx.fillStyle = '#00e5ff'; ctx.font = 'bold 11px monospace';
      ctx.fillText(`${bar}`, x + 3, RULER_H - 6);
    } else {
      ctx.fillStyle = '#4a6075'; ctx.font = '9px monospace';
      ctx.fillText(`.${beat}`, x + 2, RULER_H - 5);
    }
  }

  // Piano keys column
  ctx.fillStyle = '#0f1520';
  ctx.fillRect(0, RULER_H, KEYS_W, NUM_ROWS * rowH);
  ctx.strokeStyle = '#1a2535'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(KEYS_W, RULER_H); ctx.lineTo(KEYS_W, H); ctx.stroke();

  for (let r = 0; r < NUM_ROWS; r++) {
    const pitch = rowToPitch(r);
    const y     = RULER_H + r * rowH;
    if (isBlackKey(pitch)) {
      ctx.fillStyle = '#060a10';
      ctx.fillRect(2, y + 1, Math.floor(KEYS_W * 0.62), rowH - 1);
    } else {
      ctx.fillStyle = '#1c2d40';
      ctx.fillRect(2, y + 1, KEYS_W - 3, rowH - 1);
      if (pitch % 12 === 0) {
        const oct = Math.floor(pitch / 12) - 1;
        ctx.fillStyle = '#6ab0d4'; ctx.font = 'bold 8px sans-serif';
        ctx.fillText(`C${oct}`, KEYS_W - 22, y + rowH - 4);
      }
    }
  }

  // Corner cap
  ctx.fillStyle = '#0f1520';
  ctx.fillRect(0, 0, KEYS_W, RULER_H);
  ctx.strokeStyle = '#1a2535'; ctx.strokeRect(0, 0, KEYS_W, RULER_H);
}

function drawNotes(ctx, notes, color, rowH) {
  const CW = colWidth();
  const CB = cellBeats();
  notes.forEach(n => {
    const vel  = (n.velocity ?? 100) / 127;
    const row  = pitchToRow(n.pitch);
    const x    = KEYS_W + (n.start / CB) * CW + 1;
    const y    = RULER_H + row * rowH + 1;
    const w    = (n.duration / CB) * CW - 2;
    const h    = rowH - 2;

    // Dim background body
    ctx.fillStyle = color + '18';
    ctx.fillRect(x, y, w, h);

    // Velocity fill — rises from bottom, height proportional to velocity
    const fillH = Math.max(2, Math.round(h * vel));
    const fillY = y + h - fillH;
    ctx.fillStyle = color + '45';
    ctx.fillRect(x, fillY, w, fillH);

    // Bright level line at top of the fill (the readable indicator)
    ctx.fillStyle = color + 'dd';
    ctx.fillRect(x, fillY, w, 2);

    // Left accent bar — always solid
    ctx.fillStyle = color;
    ctx.fillRect(x, y, Math.min(3, w), h);

    // Outer border
    ctx.strokeStyle = color + '70';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
  });
}

function drawCursor(ctx, canvas) {
  if (!state.playing) return;
  const x = KEYS_W + (state.currentBeat / cellBeats()) * colWidth();
  ctx.save();
  ctx.strokeStyle = '#ff9f00'; ctx.lineWidth = 2;
  ctx.shadowColor = '#ff9f00'; ctx.shadowBlur  = 10;
  ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  ctx.restore();
}

function drawTrack(ti) {
  const { ctx, canvas } = trackEls[ti];
  const rowH = state.tracks[ti].rowH;
  drawGrid(ctx, canvas, rowH);
  drawNotes(ctx, state.tracks[ti].notes, TRACK_COLORS[ti], rowH);
  drawCursor(ctx, canvas);
}

function drawAllTracks() {
  trackEls.forEach((_, ti) => drawTrack(ti));
}

// ── Animation loop ────────────────────────────────────────────────────────────
function animLoop() {
  drawAllTracks();
  if (state.playing) requestAnimationFrame(animLoop);
}

// ── Audio engine ──────────────────────────────────────────────────────────────
let audioCtx = null, masterGain = null;
let trackGains = [], trackFxIns = [], trackFxChains = [];
let schedulerTimer = null, playStartTime = 0;
const scheduled = new Set();

function buildOutputChain(actx, destination) {
  const gain = actx.createGain();
  gain.gain.value = 0.6;
  const comp = actx.createDynamicsCompressor();
  comp.threshold.value = -10; comp.knee.value = 6;
  comp.ratio.value = 4; comp.attack.value = 0.005; comp.release.value = 0.2;
  gain.connect(comp); comp.connect(destination);
  return gain;
}

function createReverbIR(actx, roomSize, decay) {
  const sr  = actx.sampleRate;
  const dur = 0.3 + roomSize * 4.7;
  const len = Math.floor(sr * dur);
  const buf = actx.createBuffer(2, len, sr);
  const exp = 0.5 + (1 - decay) * 4;
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, exp);
  }
  return buf;
}

function setGritCurve(ws, amount) {
  if (amount < 0.01) { ws.curve = null; return; }
  const n = 256, k = amount * 100, curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = ((Math.PI + k) * x) / (Math.PI + k * Math.abs(x));
  }
  ws.curve = curve;
}

// Full FX chain: fxIn → EQ → Grit → Delay → Reverb → tGain → master
function buildTrackChain(actx, track, masterDest) {
  const tGain = actx.createGain(); tGain.gain.value = track.volume; tGain.connect(masterDest);

  // EQ
  const bassEQ = actx.createBiquadFilter();
  bassEQ.type = 'lowshelf'; bassEQ.frequency.value = 200; bassEQ.gain.value = track.eq.bass * 12;
  const trebleEQ = actx.createBiquadFilter();
  trebleEQ.type = 'highshelf'; trebleEQ.frequency.value = 4000; trebleEQ.gain.value = track.eq.treble * 12;

  // Grit
  const gritWS = actx.createWaveShaper(); gritWS.oversample = '2x';
  setGritCurve(gritWS, track.grit.amount);

  // Delay
  const delayDry  = actx.createGain(); delayDry.gain.value = 1 - track.delay.mix;
  const delayNode = actx.createDelay(4.0); delayNode.delayTime.value = track.delay.time / 1000;
  const feedbackGain = actx.createGain(); feedbackGain.gain.value = track.delay.feedback;
  const delayWet  = actx.createGain(); delayWet.gain.value = track.delay.mix;
  const delayMix  = actx.createGain(); delayMix.gain.value = 1;

  // Reverb
  const revDry = actx.createGain(); revDry.gain.value = 1 - track.reverb.mix;
  const conv   = actx.createConvolver();
  conv.buffer  = createReverbIR(actx, track.reverb.roomSize, track.reverb.decay);
  const revWet = actx.createGain(); revWet.gain.value = track.reverb.mix * 0.8;

  // Wire up
  const fxIn = actx.createGain();
  fxIn.connect(bassEQ); bassEQ.connect(trebleEQ); trebleEQ.connect(gritWS);
  gritWS.connect(delayDry);   delayDry.connect(delayMix);
  gritWS.connect(delayNode);  delayNode.connect(feedbackGain); feedbackGain.connect(delayNode);
  delayNode.connect(delayWet); delayWet.connect(delayMix);
  delayMix.connect(revDry);   revDry.connect(tGain);
  delayMix.connect(conv);     conv.connect(revWet); revWet.connect(tGain);

  return { tGain, fxIn, bassEQ, trebleEQ, gritWS, delayNode, feedbackGain, delayDry, delayWet, conv, revDry, revWet };
}

function ensureAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = buildOutputChain(audioCtx, audioCtx.destination);
  trackGains = []; trackFxIns = []; trackFxChains = [];
  state.tracks.forEach(track => {
    const chain = buildTrackChain(audioCtx, track, masterGain);
    trackGains.push(chain.tGain);
    trackFxIns.push(chain.fxIn);
    trackFxChains.push(chain);
  });
}

function applyFxParams(ti) {
  if (!audioCtx) return;
  const track = state.tracks[ti];
  const fx    = trackFxChains[ti];
  const now   = audioCtx.currentTime;
  fx.bassEQ.gain.setTargetAtTime(track.eq.bass * 12,     now, 0.02);
  fx.trebleEQ.gain.setTargetAtTime(track.eq.treble * 12, now, 0.02);
  setGritCurve(fx.gritWS, track.grit.amount);
  fx.delayNode.delayTime.setTargetAtTime(track.delay.time / 1000, now, 0.05);
  fx.feedbackGain.gain.setTargetAtTime(track.delay.feedback, now, 0.02);
  fx.delayDry.gain.setTargetAtTime(1 - track.delay.mix, now, 0.02);
  fx.delayWet.gain.setTargetAtTime(track.delay.mix,     now, 0.02);
  fx.revDry.gain.setTargetAtTime(1 - track.reverb.mix,       now, 0.05);
  fx.revWet.gain.setTargetAtTime(track.reverb.mix * 0.8,     now, 0.05);
  if (track.reverb.mix > 0.01)
    fx.conv.buffer = createReverbIR(audioCtx, track.reverb.roomSize, track.reverb.decay);
}

const PEAK_GAIN = 0.22;

function scheduleEnvelope(env, t, dur, peakGain = PEAK_GAIN) {
  const A    = state.attack  / 1000;
  const D    = state.decay   / 1000;
  const S    = state.sustain;
  const R    = state.release / 1000;
  const tEnd = t + dur;
  const tA   = t + A;
  const tD   = tA + D;

  env.gain.setValueAtTime(0, t);
  if (tA >= tEnd) {
    env.gain.linearRampToValueAtTime(peakGain * (dur / A), tEnd);
  } else {
    env.gain.linearRampToValueAtTime(peakGain, tA);
    if (tD >= tEnd) {
      env.gain.linearRampToValueAtTime(peakGain * (1 - ((tEnd - tA) / D) * (1 - S)), tEnd);
    } else {
      env.gain.linearRampToValueAtTime(S * peakGain, tD);
      env.gain.setValueAtTime(S * peakGain, tEnd);
    }
  }
  env.gain.linearRampToValueAtTime(0, tEnd + R);
  return tEnd + R + 0.01;
}

function fireNote(note, t, destGain) {
  const dur       = note.duration * secPerBeat();
  const velGain   = PEAK_GAIN * ((note.velocity ?? 100) / 127);
  const osc = audioCtx.createOscillator();
  const env = audioCtx.createGain();
  osc.type = state.waveform;
  osc.frequency.value = midiToHz(note.pitch);
  osc.connect(env); env.connect(destGain);
  const stopAt = scheduleEnvelope(env, t, dur, velGain);
  osc.start(t); osc.stop(stopAt);
}

const AHEAD = 0.12;

function tick() {
  if (!state.playing) return;
  const now     = audioCtx.currentTime;
  const elapsed = now - playStartTime;
  const patSec  = patternSec();

  if (state.looping) {
    state.currentBeat = ((elapsed % patSec) / patSec) * totalBeats();
  } else {
    state.currentBeat = Math.min(elapsed / secPerBeat(), totalBeats());
    if (elapsed >= patSec) { stopPlay(); return; }
  }

  const loopIdx  = state.looping ? Math.floor(elapsed / patSec) : 0;
  const anySolo  = state.tracks.some(t => t.solo);

  for (const li of (state.looping ? [loopIdx, loopIdx + 1] : [0])) {
    state.tracks.forEach((track, ti) => {
      if (track.mute || (anySolo && !track.solo)) return;
      trackGains[ti].gain.value = track.volume;
      track.notes.forEach((n, ni) => {
        const t = playStartTime + li * patSec + n.start * secPerBeat();
        const k = `${ti}:${ni}:${li}`;
        if (!scheduled.has(k) && t >= now - 0.001 && t < now + AHEAD) {
          scheduled.add(k); fireNote(n, t, trackFxIns[ti]);
        }
      });
    });
  }
}

async function startPlay() {
  ensureAudio();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  state.playing = true;
  state.currentBeat = 0;
  scheduled.clear();
  playStartTime  = audioCtx.currentTime;
  schedulerTimer = setInterval(tick, 25);
  document.getElementById('playBtn').classList.add('active');
  requestAnimationFrame(animLoop);
}

function stopPlay() {
  state.playing = false;
  state.currentBeat = 0;
  clearInterval(schedulerTimer); schedulerTimer = null;
  document.getElementById('playBtn').classList.remove('active');
  drawAllTracks();
}

// ── Mouse interaction ─────────────────────────────────────────────────────────
function addTrackEvents(ti) {
  const { canvas, wrap } = trackEls[ti];
  let drag = null;

  function relXY(e) {
    const r = canvas.getBoundingClientRect();
    return [e.clientX - r.left, e.clientY - r.top];
  }

  canvas.addEventListener('mousedown', e => {
    setActiveTrack(ti);
    const [x, y] = relXY(e);

    const rowH = state.tracks[ti].rowH;

    // Piano key preview
    if (x < KEYS_W && y >= RULER_H) {
      const row = Math.floor((y - RULER_H) / rowH);
      if (row >= 0 && row < NUM_ROWS) previewNote(rowToPitch(row));
      return;
    }
    if (x < KEYS_W || y < RULER_H) return;

    const col = Math.floor((x - KEYS_W) / colWidth());
    const row = Math.floor((y - RULER_H) / rowH);
    if (col < 0 || col >= numCols() || row < 0 || row >= NUM_ROWS) return;

    const pitch  = rowToPitch(row);
    const beat   = col * cellBeats();
    const notes  = state.tracks[ti].notes;
    const idx    = notes.findIndex(n => n.pitch === pitch && beat >= n.start && beat < n.start + n.duration);

    if (idx >= 0) {
      // Existing note — wait to see if it's a click (delete) or vertical drag (velocity)
      drag = { type: 'vel', note: notes[idx], idx, startY: e.clientY,
               startVel: notes[idx].velocity ?? 100, moved: false };
    } else {
      const note = { pitch, start: col * cellBeats(), duration: cellBeats(), velocity: 100 };
      notes.push(note);
      drag = { type: 'place', note, startCol: col };
    }
    drawTrack(ti);
  });

  canvas.addEventListener('mousemove', e => {
    if (!drag || !(e.buttons & 1)) { drag = null; return; }

    if (drag.type === 'place') {
      const [x] = relXY(e);
      const col = Math.min(Math.max(Math.floor((x - KEYS_W) / colWidth()), drag.startCol), numCols() - 1);
      drag.note.duration = (col - drag.startCol + 1) * cellBeats();

    } else if (drag.type === 'vel') {
      const dy = drag.startY - e.clientY; // up = positive = louder
      if (Math.abs(dy) > 3) drag.moved = true;
      if (drag.moved) {
        // 1px ≈ 1 velocity unit
        drag.note.velocity = Math.max(1, Math.min(127, Math.round(drag.startVel + dy)));
      }
    }
    drawTrack(ti);
  });

  canvas.addEventListener('mouseup', () => {
    // If user clicked an existing note without dragging, delete it
    if (drag?.type === 'vel' && !drag.moved) {
      state.tracks[ti].notes.splice(drag.idx, 1);
      drawTrack(ti);
    }
    drag = null;
  });
  canvas.addEventListener('mouseleave', () => { drag = null; });
}

function previewNote(pitch) {
  ensureAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const t   = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const env = audioCtx.createGain();
  osc.type = state.waveform; osc.frequency.value = midiToHz(pitch);
  osc.connect(env); env.connect(masterGain);
  env.gain.setValueAtTime(0.4, t);
  env.gain.linearRampToValueAtTime(0, t + 0.5);
  osc.start(t); osc.stop(t + 0.55);
}

// ── WAV export ────────────────────────────────────────────────────────────────
function encodeWAV(samples, sr) {
  const n   = samples.length;
  const buf = new ArrayBuffer(44 + n * 2);
  const v   = new DataView(buf);
  const str = (off, s) => { for (let i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i)); };
  str(0, 'RIFF'); v.setUint32(4, 36 + n * 2, true);
  str(8, 'WAVE'); str(12, 'fmt '); v.setUint32(16, 16, true);
  v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, sr, true); v.setUint32(28, sr * 2, true);
  v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  str(36, 'data'); v.setUint32(40, n * 2, true);
  for (let i = 0; i < n; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return buf;
}

async function exportAudio() {
  const hasNotes = state.tracks.some(t => t.notes.length > 0);
  if (!hasNotes) return;
  const btn = document.getElementById('exportBtn');
  btn.disabled = true; btn.textContent = 'Rendering…';
  try {
    const SR = 44100;
    const reverbTail = Math.max(0, ...state.tracks.map(t =>
      t.reverb.mix > 0 ? 0.3 + t.reverb.roomSize * 4.7 : 0));
    const delayTail = Math.max(0, ...state.tracks.map(t =>
      t.delay.mix > 0 ? (t.delay.time / 1000) * 6 : 0));
    const tail = state.release / 1000 + 0.1 + Math.max(reverbTail, delayTail);
    const totalSec = patternSec() + tail;
    const offCtx   = new OfflineAudioContext(1, Math.ceil(SR * totalSec), SR);
    const mixGain  = buildOutputChain(offCtx, offCtx.destination);
    const anySolo  = state.tracks.some(t => t.solo);

    state.tracks.forEach((track) => {
      if (track.mute || (anySolo && !track.solo) || track.notes.length === 0) return;
      const { tGain, fxIn } = buildTrackChain(offCtx, track, mixGain);
      track.notes.forEach(note => {
        const t   = note.start * secPerBeat();
        const dur = note.duration * secPerBeat();
        const osc = offCtx.createOscillator();
        const env = offCtx.createGain();
        osc.type = state.waveform; osc.frequency.value = midiToHz(note.pitch);
        osc.connect(env); env.connect(fxIn);
        const stopAt = scheduleEnvelope(env, t, dur, PEAK_GAIN * ((note.velocity ?? 100) / 127));
        osc.start(t); osc.stop(stopAt);
      });
    });

    const rendered = await offCtx.startRendering();
    const wavBuf   = encodeWAV(rendered.getChannelData(0), SR);
    const blob     = new Blob([wavBuf], { type: 'audio/wav' });
    const url      = URL.createObjectURL(blob);
    const a        = document.createElement('a');
    a.href = url; a.download = 'pattern.wav';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } finally {
    btn.disabled = false; btn.textContent = '↓ Export WAV';
  }
}

// ── Transport bindings ────────────────────────────────────────────────────────
document.querySelectorAll('.wave-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.waveform = btn.dataset.wave;
    document.querySelectorAll('.wave-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.getElementById('playBtn').addEventListener('click', () => {
  if (state.playing) stopPlay(); else startPlay();
});
document.getElementById('stopBtn').addEventListener('click', stopPlay);

document.getElementById('bpmSlider').addEventListener('input', e => {
  state.bpm = +e.target.value;
  document.getElementById('bpmVal').textContent = state.bpm;
  if (state.playing) { stopPlay(); startPlay(); }
});

document.getElementById('attack').addEventListener('input', e => {
  state.attack = +e.target.value;
  document.getElementById('attack-val').textContent = state.attack + 'ms';
});
document.getElementById('decay').addEventListener('input', e => {
  state.decay = +e.target.value;
  document.getElementById('decay-val').textContent = state.decay + 'ms';
});
document.getElementById('sustain').addEventListener('input', e => {
  state.sustain = +e.target.value;
  document.getElementById('sustain-val').textContent = state.sustain.toFixed(2);
});
document.getElementById('release').addEventListener('input', e => {
  state.release = +e.target.value;
  document.getElementById('release-val').textContent = state.release + 'ms';
});

document.getElementById('barsSelect').addEventListener('change', e => {
  state.bars = +e.target.value;
  const max = totalBeats();
  state.tracks.forEach(t => { t.notes = t.notes.filter(n => n.start < max); });
  resizeAll(); drawAllTracks();
});

document.getElementById('resSelect').addEventListener('change', e => {
  state.resolution = +e.target.value;
  resizeAll(); drawAllTracks();
});

document.getElementById('zoomSlider').addEventListener('input', e => {
  state.zoom = +e.target.value;
  document.getElementById('zoomVal').textContent = state.zoom.toFixed(1) + '×';
  resizeAll(); drawAllTracks();
});

document.getElementById('loopBtn').addEventListener('click', () => {
  state.looping = !state.looping;
  document.getElementById('loopBtn').classList.toggle('active', state.looping);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  const track = state.tracks[state.activeTrack];
  if (track.notes.length === 0) return;
  track.notes = []; drawTrack(state.activeTrack);
});

document.getElementById('exportBtn').addEventListener('click', exportAudio);

// ── Boot ──────────────────────────────────────────────────────────────────────
buildTrackUI();
resizeAll();
initScroll();
drawAllTracks();
</script>
