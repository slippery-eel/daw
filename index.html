<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAW</title>
<style>
:root {
  --bg:         #080b12;
  --surface:    #0f1520;
  --border:     #1a2535;
  --accent:     #00e5ff;
  --accent-dim: rgba(0,229,255,0.14);
  --text:       #c8d8e8;
  --muted:      #4a6075;
  --radius:     7px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
body { display: flex; flex-direction: column; height: 100dvh; }

/* ── Transport ── */
.transport {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  padding: 9px 14px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tgroup { display: flex; align-items: center; gap: 7px; }
.tdiv   { width: 1px; height: 22px; background: var(--border); }
.tlabel { color: var(--muted); font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.07em; }

button {
  background: transparent; border: 1px solid var(--border);
  color: var(--text); padding: 5px 13px; border-radius: var(--radius);
  cursor: pointer; font-size: 13px; font-family: inherit;
  transition: border-color .15s, color .15s, background .15s, box-shadow .15s;
  white-space: nowrap;
}
button:hover { border-color: var(--accent); color: var(--accent); }
button.active {
  background: var(--accent-dim); border-color: var(--accent);
  color: var(--accent); box-shadow: 0 0 10px rgba(0,229,255,.18);
}

input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 96px; height: 4px; border-radius: 2px;
  background: var(--border); outline: none; cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--accent); cursor: pointer;
}
input[type="range"]::-moz-range-thumb {
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--accent); border: none; cursor: pointer;
}

select {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 4px 7px; border-radius: var(--radius);
  font-size: 13px; font-family: inherit; cursor: pointer;
}
select:focus { outline: 1px solid var(--accent); }

.bpm-val { color: var(--accent); font-size: 13px; font-variant-numeric: tabular-nums; min-width: 30px; }

.adsr-group { align-items: flex-start; flex-direction: column; gap: 2px; }
.adsr-row   { display: flex; align-items: center; gap: 5px; }
.adsr-lbl   { color: var(--muted); font-size: 10px; font-weight: 700;
  letter-spacing: 0.04em; width: 10px; text-align: right; }
.adsr-slider { width: 72px; }
.adsr-val   { color: var(--accent); font-size: 10px; font-variant-numeric: tabular-nums;
  min-width: 36px; }

/* ── Piano roll ── */
.roll-wrap { flex: 1; overflow: auto; position: relative; }
#roll { display: block; cursor: crosshair; }
</style>
</head>
<body>

<div class="transport">
  <div class="tgroup">
    <button id="playBtn">▶ Play</button>
    <button id="stopBtn">■ Stop</button>
  </div>
  <div class="tdiv"></div>
  <div class="tgroup">
    <span class="tlabel">BPM</span>
    <input type="range" id="bpmSlider" min="40" max="220" value="120">
    <span class="bpm-val" id="bpmVal">120</span>
  </div>
  <div class="tdiv"></div>
  <div class="tgroup">
    <span class="tlabel">Bars</span>
    <select id="barsSelect">
      <option value="1">1</option>
      <option value="2" selected>2</option>
      <option value="4">4</option>
      <option value="8">8</option>
    </select>
  </div>
  <div class="tdiv"></div>
  <div class="tgroup">
    <span class="tlabel">Wave</span>
    <button class="wave-btn active" data-wave="sine">Sine</button>
    <button class="wave-btn" data-wave="square">Square</button>
    <button class="wave-btn" data-wave="triangle">Tri</button>
    <button class="wave-btn" data-wave="sawtooth">Saw</button>
  </div>
  <div class="tdiv"></div>
  <div class="tgroup adsr-group">
    <div class="adsr-row">
      <span class="adsr-lbl">A</span>
      <input type="range" id="attack"  class="adsr-slider" min="1"  max="500"  step="1"    value="5">
      <span class="adsr-val" id="attack-val">5ms</span>
    </div>
    <div class="adsr-row">
      <span class="adsr-lbl">D</span>
      <input type="range" id="decay"   class="adsr-slider" min="10" max="1000" step="5"    value="80">
      <span class="adsr-val" id="decay-val">80ms</span>
    </div>
    <div class="adsr-row">
      <span class="adsr-lbl">S</span>
      <input type="range" id="sustain" class="adsr-slider" min="0"  max="1"    step="0.01" value="0.7">
      <span class="adsr-val" id="sustain-val">0.70</span>
    </div>
    <div class="adsr-row">
      <span class="adsr-lbl">R</span>
      <input type="range" id="release" class="adsr-slider" min="10" max="2000" step="5"    value="60">
      <span class="adsr-val" id="release-val">60ms</span>
    </div>
  </div>
  <div class="tdiv"></div>
  <div class="tgroup">
    <button id="loopBtn" class="active">⟳ Loop</button>
  </div>
  <div class="tdiv"></div>
  <div class="tgroup">
    <button id="clearBtn">✕ Clear</button>
  </div>
</div>

<div class="roll-wrap">
  <canvas id="roll"></canvas>
</div>

<script>
'use strict';

// ── Layout ────────────────────────────────────────────────────────────────────
const KEYS_W   = 64;   // piano key column width
const RULER_H  = 26;   // timeline ruler height
const ROW_H    = 18;   // px per semitone row
const COL_W    = 30;   // px per 16th-note column
const PITCH_HI = 83;   // B5 (top row)
const PITCH_LO = 36;   // C2 (bottom row)
const NUM_ROWS = PITCH_HI - PITCH_LO + 1; // 48
const BLACK_KEYS = new Set([1, 3, 6, 8, 10]); // semitone offsets that are black keys

// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  notes: [],       // [{pitch, start, duration}] — start/duration in beats (1 beat = quarter note)
  bpm:      120,
  bars:     2,
  waveform: 'sine',
  attack:   5,     // ms
  decay:    80,    // ms
  sustain:  0.7,   // 0–1 level
  release:  60,    // ms
  playing:  false,
  looping:  true,
  currentBeat: 0,
};

const CELL_BEATS = 0.25; // one 16th note

function totalBeats()     { return state.bars * 4; }
function numCols()        { return state.bars * 16; }
function secPerBeat()     { return 60 / state.bpm; }
function patternSec()     { return totalBeats() * secPerBeat(); }
function isBlackKey(p)    { return BLACK_KEYS.has(p % 12); }
function pitchToRow(p)    { return PITCH_HI - p; }
function rowToPitch(r)    { return PITCH_HI - r; }
function midiToHz(m)      { return 440 * Math.pow(2, (m - 69) / 12); }

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('roll');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = KEYS_W + numCols() * COL_W;
  canvas.height = RULER_H + NUM_ROWS * ROW_H;
  canvas.style.width  = canvas.width  + 'px';
  canvas.style.height = canvas.height + 'px';
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function drawGrid() {
  const W = canvas.width, H = canvas.height;
  const nc = numCols();

  ctx.fillStyle = '#080b12';
  ctx.fillRect(0, 0, W, H);

  // Black-key row tint
  for (let r = 0; r < NUM_ROWS; r++) {
    if (isBlackKey(rowToPitch(r))) {
      ctx.fillStyle = 'rgba(0,0,0,.28)';
      ctx.fillRect(KEYS_W, RULER_H + r * ROW_H, nc * COL_W, ROW_H);
    }
  }

  // Vertical lines (columns)
  for (let c = 0; c <= nc; c++) {
    const x = KEYS_W + c * COL_W;
    const isBar  = c % 16 === 0;
    const isBeat = c % 4  === 0;
    ctx.strokeStyle = isBar ? '#2a4060' : isBeat ? '#1e3050' : '#13213a';
    ctx.lineWidth   = isBar ? 1.5 : 1;
    ctx.beginPath(); ctx.moveTo(x, RULER_H); ctx.lineTo(x, H); ctx.stroke();
  }

  // Horizontal lines (rows)
  ctx.strokeStyle = '#13213a'; ctx.lineWidth = 1;
  for (let r = 0; r <= NUM_ROWS; r++) {
    const y = RULER_H + r * ROW_H;
    ctx.beginPath(); ctx.moveTo(KEYS_W, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Ruler background
  ctx.fillStyle = '#0f1520';
  ctx.fillRect(0, 0, W, RULER_H);
  ctx.strokeStyle = '#1a2535'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, RULER_H); ctx.lineTo(W, RULER_H); ctx.stroke();

  // Ruler labels & tick marks
  for (let c = 0; c <= nc; c++) {
    const isBeat = c % 4 === 0;
    const isBar  = c % 16 === 0;
    if (!isBeat && !isBar) continue;
    const x    = KEYS_W + c * COL_W;
    const bar  = Math.floor(c / 16) + 1;
    const beat = Math.floor((c % 16) / 4) + 1;
    ctx.strokeStyle = isBar ? '#2a4060' : '#1e3050';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, isBar ? 0 : RULER_H - 7); ctx.lineTo(x, RULER_H); ctx.stroke();
    if (isBar) {
      ctx.fillStyle = '#00e5ff';
      ctx.font = 'bold 11px monospace';
      ctx.fillText(`${bar}`, x + 3, RULER_H - 6);
    } else {
      ctx.fillStyle = '#4a6075';
      ctx.font = '9px monospace';
      ctx.fillText(`.${beat}`, x + 2, RULER_H - 5);
    }
  }

  // Piano key column
  ctx.fillStyle = '#0f1520';
  ctx.fillRect(0, RULER_H, KEYS_W, NUM_ROWS * ROW_H);
  ctx.strokeStyle = '#1a2535'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(KEYS_W, RULER_H); ctx.lineTo(KEYS_W, H); ctx.stroke();

  for (let r = 0; r < NUM_ROWS; r++) {
    const pitch = rowToPitch(r);
    const y = RULER_H + r * ROW_H;
    const note = pitch % 12;
    if (isBlackKey(pitch)) {
      ctx.fillStyle = '#060a10';
      ctx.fillRect(2, y + 1, Math.floor(KEYS_W * 0.62), ROW_H - 1);
    } else {
      ctx.fillStyle = '#1c2d40';
      ctx.fillRect(2, y + 1, KEYS_W - 3, ROW_H - 1);
      if (note === 0) {
        const oct = Math.floor(pitch / 12) - 1;
        ctx.fillStyle = '#6ab0d4';
        ctx.font = 'bold 8px sans-serif';
        ctx.fillText(`C${oct}`, KEYS_W - 22, y + ROW_H - 4);
      }
    }
  }

  // Corner cap
  ctx.fillStyle = '#0f1520';
  ctx.fillRect(0, 0, KEYS_W, RULER_H);
  ctx.strokeStyle = '#1a2535';
  ctx.strokeRect(0, 0, KEYS_W, RULER_H);
}

function drawNotes() {
  state.notes.forEach(n => {
    const row = pitchToRow(n.pitch);
    const x   = KEYS_W + (n.start / CELL_BEATS) * COL_W + 1;
    const y   = RULER_H + row * ROW_H + 1;
    const w   = (n.duration / CELL_BEATS) * COL_W - 2;
    const h   = ROW_H - 2;

    // Body fill
    ctx.fillStyle = 'rgba(0,229,255,0.15)';
    ctx.fillRect(x, y, w, h);
    // Left accent bar
    ctx.fillStyle = '#00e5ff';
    ctx.fillRect(x, y, Math.min(3, w), h);
    // Border
    ctx.strokeStyle = 'rgba(0,200,224,0.7)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
  });
}

function drawCursor() {
  if (!state.playing) return;
  const x = KEYS_W + (state.currentBeat / CELL_BEATS) * COL_W;
  ctx.save();
  ctx.strokeStyle = '#ff9f00';
  ctx.lineWidth   = 2;
  ctx.shadowColor = '#ff9f00';
  ctx.shadowBlur  = 10;
  ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  ctx.restore();
}

function drawAll() { drawGrid(); drawNotes(); drawCursor(); }

// ── Animation loop ────────────────────────────────────────────────────────────
function animLoop() {
  drawAll();
  if (state.playing) requestAnimationFrame(animLoop);
}

// ── Audio engine ──────────────────────────────────────────────────────────────
let audioCtx = null, masterGain = null;
let schedulerTimer = null, playStartTime = 0;
const scheduled = new Set(); // "noteIdx:loopIdx" keys

function ensureAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.65;
  // Hard limiter — prevents clipping when many notes sound simultaneously
  const limiter = audioCtx.createDynamicsCompressor();
  limiter.threshold.value = -3;
  limiter.knee.value       = 0;
  limiter.ratio.value      = 20;
  limiter.attack.value     = 0.001;
  limiter.release.value    = 0.08;
  masterGain.connect(limiter);
  limiter.connect(audioCtx.destination);
}

const PEAK_GAIN = 0.5;

function fireNote(note, t) {
  const dur = note.duration * secPerBeat();
  const A   = state.attack  / 1000;
  const D   = state.decay   / 1000;
  const S   = state.sustain;
  const R   = state.release / 1000;

  const tA   = t + Math.min(A, dur);               // end of attack
  const tD   = Math.min(tA + D, t + dur);           // end of decay (clamped to gate)
  const tEnd = t + dur;                             // note-off / start of release

  const osc = audioCtx.createOscillator();
  const env = audioCtx.createGain();
  osc.type = state.waveform;
  osc.frequency.value = midiToHz(note.pitch);
  osc.connect(env); env.connect(masterGain);

  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(PEAK_GAIN, tA);           // attack
  env.gain.linearRampToValueAtTime(S * PEAK_GAIN, tD);       // decay → sustain
  env.gain.setValueAtTime(S * PEAK_GAIN, tEnd);              // hold sustain
  env.gain.linearRampToValueAtTime(0, tEnd + R);             // release

  osc.start(t);
  osc.stop(tEnd + R + 0.01);
}

const AHEAD = 0.12; // seconds to schedule ahead

function tick() {
  if (!state.playing) return;
  const now     = audioCtx.currentTime;
  const elapsed = now - playStartTime;
  const patSec  = patternSec();

  if (state.looping) {
    state.currentBeat = ((elapsed % patSec) / patSec) * totalBeats();
  } else {
    state.currentBeat = Math.min(elapsed / secPerBeat(), totalBeats());
    if (elapsed >= patSec) { stopPlay(); return; }
  }

  const loopIdx = state.looping ? Math.floor(elapsed / patSec) : 0;

  for (const li of state.looping ? [loopIdx, loopIdx + 1] : [0]) {
    state.notes.forEach((n, ni) => {
      const t = playStartTime + li * patSec + n.start * secPerBeat();
      const k = `${ni}:${li}`;
      if (!scheduled.has(k) && t >= now - 0.001 && t < now + AHEAD) {
        scheduled.add(k); fireNote(n, t);
      }
    });
  }
}

async function startPlay() {
  ensureAudio();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  state.playing = true;
  state.currentBeat = 0;
  scheduled.clear();
  playStartTime   = audioCtx.currentTime;
  schedulerTimer  = setInterval(tick, 25);
  document.getElementById('playBtn').classList.add('active');
  requestAnimationFrame(animLoop);
}

function stopPlay() {
  state.playing = false;
  state.currentBeat = 0;
  clearInterval(schedulerTimer); schedulerTimer = null;
  document.getElementById('playBtn').classList.remove('active');
  drawAll();
}

// ── Mouse interaction ─────────────────────────────────────────────────────────
let drag = null; // {note, startCol} while placing

function relXY(e) {
  const r = canvas.getBoundingClientRect();
  return [e.clientX - r.left, e.clientY - r.top];
}

function xyToGrid(x, y) {
  return {
    col: Math.floor((x - KEYS_W) / COL_W),
    row: Math.floor((y - RULER_H) / ROW_H),
  };
}

function noteAt(pitch, col) {
  const beat = col * CELL_BEATS;
  return state.notes.findIndex(n =>
    n.pitch === pitch && beat >= n.start && beat < n.start + n.duration
  );
}

canvas.addEventListener('mousedown', e => {
  const [x, y] = relXY(e);

  // Piano key preview click
  if (x < KEYS_W && y >= RULER_H) {
    const row = Math.floor((y - RULER_H) / ROW_H);
    if (row >= 0 && row < NUM_ROWS) previewNote(rowToPitch(row));
    return;
  }

  if (x < KEYS_W || y < RULER_H) return;
  const { col, row } = xyToGrid(x, y);
  if (col < 0 || col >= numCols() || row < 0 || row >= NUM_ROWS) return;

  const pitch = rowToPitch(row);
  const idx   = noteAt(pitch, col);

  if (idx >= 0) {
    // Remove note
    state.notes.splice(idx, 1);
    drag = null;
  } else {
    // Begin placing note
    const note = { pitch, start: col * CELL_BEATS, duration: CELL_BEATS };
    state.notes.push(note);
    drag = { note, startCol: col };
  }
  drawAll();
});

canvas.addEventListener('mousemove', e => {
  if (!drag || !(e.buttons & 1)) { drag = null; return; }
  const [x] = relXY(e);
  const col = Math.min(Math.max(Math.floor((x - KEYS_W) / COL_W), drag.startCol), numCols() - 1);
  drag.note.duration = (col - drag.startCol + 1) * CELL_BEATS;
  drawAll();
});

canvas.addEventListener('mouseup',    () => { drag = null; });
canvas.addEventListener('mouseleave', () => { drag = null; });

function previewNote(pitch) {
  ensureAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const t   = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const env = audioCtx.createGain();
  osc.type = state.waveform; osc.frequency.value = midiToHz(pitch);
  osc.connect(env); env.connect(masterGain);
  env.gain.setValueAtTime(0.4, t);
  env.gain.linearRampToValueAtTime(0, t + 0.5);
  osc.start(t); osc.stop(t + 0.55);
}

// ── Transport bindings ────────────────────────────────────────────────────────
document.querySelectorAll('.wave-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.waveform = btn.dataset.wave;
    document.querySelectorAll('.wave-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.getElementById('playBtn').addEventListener('click', () => {
  if (state.playing) stopPlay(); else startPlay();
});

document.getElementById('stopBtn').addEventListener('click', stopPlay);

document.getElementById('bpmSlider').addEventListener('input', e => {
  state.bpm = +e.target.value;
  document.getElementById('bpmVal').textContent = state.bpm;
  if (state.playing) { stopPlay(); startPlay(); }
});

document.getElementById('attack').addEventListener('input', e => {
  state.attack = +e.target.value;
  document.getElementById('attack-val').textContent = state.attack + 'ms';
});
document.getElementById('decay').addEventListener('input', e => {
  state.decay = +e.target.value;
  document.getElementById('decay-val').textContent = state.decay + 'ms';
});
document.getElementById('sustain').addEventListener('input', e => {
  state.sustain = +e.target.value;
  document.getElementById('sustain-val').textContent = state.sustain.toFixed(2);
});
document.getElementById('release').addEventListener('input', e => {
  state.release = +e.target.value;
  document.getElementById('release-val').textContent = state.release + 'ms';
});

document.getElementById('barsSelect').addEventListener('change', e => {
  state.bars = +e.target.value;
  const max = totalBeats();
  state.notes = state.notes.filter(n => n.start < max);
  resizeCanvas(); drawAll();
});

document.getElementById('loopBtn').addEventListener('click', () => {
  state.looping = !state.looping;
  document.getElementById('loopBtn').classList.toggle('active', state.looping);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (state.notes.length === 0) return;
  state.notes = []; drawAll();
});

// ── Boot ──────────────────────────────────────────────────────────────────────
resizeCanvas();
drawAll();
</script>
</body>
</html>
